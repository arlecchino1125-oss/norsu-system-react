<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120">
  <style>
    .bg { fill: #252525; }
    .title { font: 700 24px 'Times New Roman', serif; fill: #ffffff; }
    .subtitle { font: 700 20px 'Times New Roman', serif; fill: #ffffff; }
    .system { fill: #fafafa; stroke: #111111; stroke-width: 2.2; }
    .system-title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #111111; }
    .section-label { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #666666; letter-spacing: 1px; }
    .usecase { fill: #fcfcfc; stroke: #111111; stroke-width: 2.2; }
    .usecase-text { font: 600 15px 'Segoe UI', Arial, sans-serif; fill: #111111; }
    .assoc { fill: none; stroke: #111111; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .actor { fill: none; stroke: #111111; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    .actor-head { fill: #ffffff; stroke: #111111; stroke-width: 2.2; }
    .actor-box { fill: #ffffff; stroke: #111111; stroke-width: 1.8; }
    .actor-label { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #111111; }
    .caption { font: 700 16px 'Times New Roman', serif; fill: #ffffff; }
  </style>

  <rect class="bg" x="0" y="0" width="1600" height="1120" />

  <text class="title" x="800" y="42" text-anchor="middle">Use Case Diagram of the NORSU-G CARE Center Management System</text>
  <text class="subtitle" x="800" y="72" text-anchor="middle">Simplified Top-Level User and Staff Interactions</text>

